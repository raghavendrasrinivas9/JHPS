<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jaya Hari Parayana Sangha</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">

<style>
  body { overflow: hidden; height: 100vh; display: flex; flex-direction: column; font-family: sans-serif; }
  
  .tab-btn { padding:10px; border-radius:12px; cursor:pointer; margin-bottom:6px; font-weight:600; background-color: #fde68a; transition: 0.2s; font-size: 0.9rem; border: 1px solid transparent; color: #92400e; }
  .tab-btn:hover { background-color: #fb923c; color: white; }
  .active-tab { background-color: #ea580c !important; color: white !important; border-color: #9a3412; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
  
  .top-btn { padding:6px 16px; border-radius:9999px; font-weight:bold; margin-right:8px; background-color: #fde68a; font-size: 0.85rem; color: #92400e; }
  .top-btn.active { background-color: #ea580c; color: white; }
  
  .action-btn { display:inline-block; margin-top:8px; padding:8px 20px; border-radius:8px; color:white; font-weight:bold; text-decoration:none; font-size: 0.9rem; transition: 0.3s; }
  .whatsapp { background-color: #16a34a; }
  .whatsapp:hover { background-color: #15803d; }
  .form { background-color: #2563eb; }
  .form:hover { background-color: #1d4ed8; }

  .custom-scroll::-webkit-scrollbar { width: 6px; }
  .custom-scroll::-webkit-scrollbar-thumb { background: #fb923c; border-radius: 10px; }

  .motto-text { font-weight: 800; color: #7c2d12; text-transform: uppercase; letter-spacing: 0.05em; font-size: 1.1rem; }

  .img-card { 
    height: 280px; 
    background: #fff; 
    border-radius: 1rem; 
    overflow: hidden; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    border: 4px solid #fff;
    box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
  }
  .gallery-img { max-height: 100%; max-width: 100%; object-fit: contain; }
</style>
</head>

<body class="bg-yellow-50">

<header class="bg-yellow-100 p-3 shadow-sm shrink-0 border-b border-yellow-200">
  <div class="max-w-6xl mx-auto flex justify-between items-center">
    <div class="w-1/3 text-left"><span class="motto-text ml-4 hidden md:inline">Hari Sarvothama</span></div>
    <div class="w-1/3 flex justify-center">
      <img src="JHPS.jpg" alt="JHPS Logo" class="h-32 md:h-40 w-auto rounded-xl shadow-lg border-2 border-white bg-white">
    </div>
    <div class="w-1/3 text-right"><span class="motto-text mr-4 hidden md:inline">Vayu Jeevothama</span></div>
  </div>
</header>

<div class="flex flex-1 overflow-hidden">
  <aside class="w-60 bg-yellow-100 p-4 border-r border-yellow-200 flex flex-col shrink-0 overflow-y-auto custom-scroll">
    <div id="parayanaTab" class="tab-btn active-tab" onclick="switchTab('parayana')">📖 Parayana</div>
    <div id="bhajanaTab" class="tab-btn" onclick="switchTab('bhajana')">🎵 Bhajana</div>
    <div id="trainingsTab" class="tab-btn" onclick="switchTab('trainings')">🎓 Trainings</div>
    <div id="sevaTab" class="tab-btn" onclick="switchTab('seva')">❤️ Seva</div>
    <div id="activitiesTab" class="tab-btn" onclick="switchTab('activities')">📅 Activities</div>
    <div id="aboutTab" class="tab-btn" onclick="switchTab('about')">ℹ️ About Us</div>
    <div id="contactTab" class="tab-btn" onclick="switchTab('contact')">📞 Contact</div>
  </aside>

  <main class="flex-1 p-6 flex flex-col overflow-hidden">
    <div class="mb-4 flex items-center shrink-0">
      <button id="infoBtn" class="top-btn active" onclick="showView('info')">Info Details</button>
      <button id="galleryBtn" class="top-btn" onclick="showView('gallery')">Gallery View</button>
    </div>
    <div id="contentArea" class="bg-white p-6 rounded-2xl shadow-md border border-yellow-100 flex-1 overflow-y-auto custom-scroll"></div>
  </main>
</div>

<script>
let activeTab = "parayana";
let currentView = "info";

const WHATSAPP = "919686155558";
const FORM = "https://docs.google.com/forms/d/1JZgvz4o701VtrCeTcyD5mb1Dl31DC_eAXagFk_2iUck/viewform";

// Static Content
const contentData = {
  parayana: ["Rayara Ashtottara", "Hari Vayu Stuti Purascharana", "Sundarakanda"],
  bhajana: ["Jaya Hari Bhajana Mandali"],
  trainings: ["Sandhya Vandana", "Sankshipta Deva Pooja", "Mantrabhyasa"],
  seva: ["Annadhana"],
  activities: ["Weekly Events"],
  about: ["Nurturing Dharma Through Practice."],
  contact: ["Jaya Hari Parayana Sangha", "Ph: 9686155558", "Email: jayahariparayanasangha@gmail.com"]
};

const gallery = {
  parayana: ["images/Parayana1.jpg", "images/Parayana2.jpg"],
  bhajana: ["images/Bhajana1.jpg", "images/Bhajana2.jpg"],
  trainings: ["images/Training1.jpg", "images/Training2.jpg", "images/Training3.jpg", "images/Training4.jpg"],
  seva: ["images/Seva1.jpg", "images/Seva2.jpg"],
  activities: ["images/Activities1.jpg", "images/Activities2.jpg"]
};

function switchTab(tab){
  activeTab = tab;
  ["parayana","bhajana","trainings","seva","activities","about","contact"].forEach(t => {
    const el = document.getElementById(t + "Tab");
    if(el) el.classList.remove("active-tab");
  });
  document.getElementById(tab + "Tab").classList.add("active-tab");
  render();
}

function showView(view){
  currentView = view;
  document.getElementById("infoBtn").classList.toggle("active", view === "info");
  document.getElementById("galleryBtn").classList.toggle("active", view === "gallery");
  render();
}

function render(){
  let area = document.getElementById("contentArea");
  if (currentView === "gallery") renderGallery(area);
  else renderInfo(area);
}

function renderInfo(container){
  let data = contentData[activeTab] || [];
  let html = `<h2 class='text-2xl font-bold capitalize mb-6 text-orange-800 border-b-2 border-orange-100 pb-2'>${activeTab === 'about' ? 'About Us' : activeTab}</h2>`;
  
  if(activeTab === 'about') {
    html += `<div class="text-gray-800 text-lg font-bold bg-yellow-50 p-6 rounded-2xl border border-yellow-100 shadow-sm">${data[0] || ""}</div>`;
  } else {
    html += "<ul class='space-y-4'>";
    data.forEach(item => html += `<li class='bg-yellow-50 p-4 rounded-xl border text-lg font-bold shadow-sm'>✦ ${item}</li>`);
    html += "</ul>";
  }

  if(activeTab === "parayana") {
    html += `
      <div class='mt-10 p-6 bg-yellow-100 border-l-4 border-yellow-500 rounded-r-xl shadow-sm text-center'>
        <p class='font-bold text-orange-900 text-lg mb-4 italic underline'>Please contact us via WhatsApp to confirm slots before registering.</p>
        <div class='flex flex-wrap justify-center gap-4'>
          <a class='action-btn whatsapp shadow-md' href='https://wa.me/${WHATSAPP}' target='_blank'>WhatsApp Contact</a>
          <a class='action-btn form shadow-md' href='${FORM}' target='_blank'>Register Online</a>
        </div>
      </div>`;
  }
  container.innerHTML = html;
}

function renderGallery(container){
  let html = `<h2 class='text-2xl font-bold mb-6 text-orange-800 border-b-2 border-orange-100 pb-2'>Gallery</h2>`;
  html += "<div class='grid grid-cols-1 md:grid-cols-2 gap-8'>";
  const imgs = gallery[activeTab] || [];
  imgs.forEach((img) => {
    html += `<div class="img-card relative">
        <img src='${img}' class='gallery-img' onerror="this.src='https://via.placeholder.com/400x300?text=Image+Loading...'">
    </div>`;
  });
  if(imgs.length === 0) html += `<p class="text-gray-400 italic text-center py-20 w-full col-span-2">No photos available yet.</p>`;
  html += "</div>";
  container.innerHTML = html;
}

render();
</script>
</body>
</html>
