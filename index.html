<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jaya Hari Parayana Sangha</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
  body { overflow: hidden; height: 100vh; display: flex; flex-direction: column; font-family: sans-serif; }
  .tab-btn { padding:10px; border-radius:10px; cursor:pointer; margin-bottom:6px; font-weight:600; background:#fde68a; transition: 0.2s; font-size: 0.9rem; border: 1px solid transparent; }
  .tab-btn:hover { background:#fb923c; color:white; }
  .active-tab { background:#ea580c !important; color:white !important; border-color: #9a3412; }
  .top-btn { padding:6px 14px; border-radius:20px; font-weight:bold; margin-right:8px; background:#fed7aa; font-size: 0.85rem; transition: 0.3s; }
  .top-btn.active { background:#ea580c; color:white; }
  .action-btn { display:inline-block; margin-top:8px; padding:8px 12px; border-radius:8px; color:white; font-weight:bold; text-decoration:none; font-size: 0.85rem; }
  .whatsapp { background:#16a34a; }
  .form { background:#2563eb; }
  .custom-scroll::-webkit-scrollbar { width: 6px; }
  .custom-scroll::-webkit-scrollbar-track { background: transparent; }
  .custom-scroll::-webkit-scrollbar-thumb { background: #fed7aa; border-radius: 10px; }
  .admin-tab { background: #e2e8f0; border: 1px dashed #cbd5e1; margin-top: auto; }
</style>
</head>

<body class="bg-orange-50">

<header class="bg-orange-200 p-3 flex justify-center items-center shadow-sm shrink-0">
    <img src="JHPS.jpg" alt="JHPS Logo" class="h-40 w-auto rounded-lg shadow-md border-2 border-white bg-white">
</header>

<div class="flex flex-1 overflow-hidden">
  <aside class="w-56 bg-orange-100 p-3 border-r border-orange-200 flex flex-col shrink-0 overflow-y-auto custom-scroll">
    <div id="parayanaTab" class="tab-btn active-tab" onclick="switchTab('parayana')">📖 Parayana</div>
    <div id="bhajanaTab" class="tab-btn" onclick="switchTab('bhajana')">🎵 Bhajana</div>
    <div id="trainingsTab" class="tab-btn" onclick="switchTab('trainings')">🎓 Trainings</div>
    <div id="sevaTab" class="tab-btn" onclick="switchTab('seva')">❤️ Seva</div>
    <div id="activitiesTab" class="tab-btn" onclick="switchTab('activities')">📅 Activities</div>
    <div id="aboutTab" class="tab-btn" onclick="switchTab('about')">ℹ️ About Us</div>
    <div id="contactTab" class="tab-btn" onclick="switchTab('contact')">📞 Contact</div>
    
    <div class="mt-auto pt-4">
      <div id="adminTab" class="tab-btn admin-tab" onclick="switchTab('admin')">🔒 Admin Login</div>
    </div>
  </aside>

  <main class="flex-1 p-4 flex flex-col overflow-hidden">
    <div class="mb-3 flex items-center shrink-0">
      <button id="infoBtn" class="top-btn active" onclick="showView('info')">Info</button>
      <button id="galleryBtn" class="top-btn" onclick="showView('gallery')">Gallery</button>
    </div>

    <div id="contentArea" class="bg-white p-6 rounded-xl shadow-sm border border-orange-100 flex-1 overflow-y-auto custom-scroll">
    </div>
  </main>
</div>

<script>
let activeTab = "parayana";
let currentView = "info";
let isAdmin = false;

const WHATSAPP = "919686155558";
const FORM = "https://docs.google.com/forms/d/1JZgvz4o701VtrCeTcyD5mb1Dl31DC_eAXagFk_2iUck/viewform";

let contentData = JSON.parse(localStorage.getItem("contentData")) || {
  parayana: ["Rayara Ashtottara", "Hari Vayu Stuti Purascharana", "Sundarakanda"],
  bhajana: ["Jaya Hari Bhajana Mandali", "Hari Priya Bhajana Mandali"],
  trainings: ["Sandhya Vandana", "Deva Pooja"],
  seva: ["Annadhana"],
  activities: ["Weekly Events"],
  about: ["Welcome to Jaya Hari Parayana Sangha. Update this text from the Admin panel."],
  contact: ["Jaya Hari Parayana Sangha", "Ph: 9686155558", "Email: jayahariparayanasangha@gmail.com"]
};

let gallery = JSON.parse(localStorage.getItem("gallery")) || {};

function switchTab(tab){
  activeTab = tab;
  const allTabs = ["parayana","bhajana","trainings","seva","activities","about","contact","admin"];
  allTabs.forEach(t => {
    const el = document.getElementById(t + "Tab");
    if(el) el.classList.remove("active-tab");
  });
  document.getElementById(tab + "Tab").classList.add("active-tab");
  render();
}

function showView(view){
  currentView = view;
  document.getElementById("infoBtn").classList.toggle("active", view === "info");
  document.getElementById("galleryBtn").classList.toggle("active", view === "gallery");
  render();
}

function render(){
  let area = document.getElementById("contentArea");
  if (activeTab === "admin") renderAdminPanel(area);
  else if (currentView === "gallery") renderGallery(area);
  else renderInfo(area);
}

function renderAdminPanel(container) {
  if (!isAdmin) {
    container.innerHTML = `
      <div class="max-w-xs mx-auto mt-10 p-6 border rounded-xl bg-gray-50 text-center shadow-inner">
        <h2 class="text-lg font-bold mb-4">Admin Login</h2>
        <input type="password" id="adminPwd" class="border p-2 rounded w-full mb-4 text-sm outline-none" placeholder="Password">
        <button onclick="handleLogin()" class="bg-orange-600 text-white px-4 py-2 rounded font-bold w-full text-sm">Submit</button>
      </div>`;
  } else {
    container.innerHTML = `
      <div class="max-w-xs mx-auto mt-10 p-6 border rounded-xl bg-green-50 text-center shadow-inner">
        <p class="text-green-800 font-bold mb-4">Logged In Successfully</p>
        <button onclick="handleLogout()" class="bg-red-500 text-white px-4 py-2 rounded font-bold w-full text-sm">Logout</button>
      </div>`;
  }
}

function handleLogin() {
  if (document.getElementById("adminPwd").value === "admin123") {
    isAdmin = true; switchTab('parayana');
  } else { alert("Incorrect Password"); }
}

function handleLogout() { isAdmin = false; switchTab('parayana'); }

function renderInfo(container){
  let data = contentData[activeTab] || [];
  let displayTitle = activeTab === 'about' ? 'About Us' : activeTab;
  let html = `<h2 class='text-xl font-bold capitalize mb-4 text-orange-800 border-b-2 border-orange-100 pb-2'>${displayTitle}</h2>`;

  if(isAdmin){
    html += `<div class='mb-4 flex gap-2'>
      <button onclick='addContent()' class='bg-blue-600 text-white px-3 py-1 rounded text-xs font-bold hover:bg-blue-700'>
        ${activeTab === 'about' ? 'Update Text' : '+ Add Item'}
      </button>
      ${activeTab !== 'about' ? `<button onclick='editContent()' class='bg-yellow-500 text-white px-3 py-1 rounded text-xs font-bold hover:bg-yellow-600'>✏️ Edit List</button>` : ''}
    </div>`;
  }

  if(activeTab === 'about') {
    html += `<div class="text-gray-800 text-lg font-medium leading-relaxed bg-orange-50/40 p-6 rounded-xl border border-orange-100 shadow-sm whitespace-pre-wrap">
               ${data[0] || "No description yet."}
             </div>`;
  } else {
    html += "<ul class='space-y-4'>";
    data.forEach(item => {
        html += `<li class='flex items-start gap-4 text-gray-800 bg-orange-50/40 p-4 rounded-xl border border-orange-100 text-lg font-semibold shadow-sm'>
                  <span class='text-orange-600 mt-1'>✦</span> <span class="leading-relaxed">${item}</span>
                </li>`;
    });
    html += "</ul>";
  }

  if(activeTab === "parayana"){
    html += `
      <div class='mt-8 p-5 bg-yellow-50 border-l-4 border-yellow-400 rounded-r shadow-sm'>
        <p class='font-bold text-orange-900 text-base mb-3'>Contact us to confirm slots before registering.</p>
        <div class='flex gap-2'>
          <a class='action-btn whatsapp text-base' href='https://wa.me/${WHATSAPP}' target='_blank'>WhatsApp</a>
          <a class='action-btn form text-base' href='${FORM}' target='_blank'>Register</a>
        </div>
      </div>`;
  }
  container.innerHTML = html;
}

function renderGallery(container){
  let html = `<h2 class='text-xl font-bold mb-4 text-orange-800 border-b-2 border-orange-100 pb-2'>Gallery</h2>`;
  if(isAdmin) html += `<input type="file" multiple onchange="uploadImages(event)" class="mb-4 text-xs block">`;

  html += "<div class='grid grid-cols-2 gap-4'>";
  const imgs = gallery[activeTab] || [];
  imgs.forEach((img, index) => {
    html += `<div class='relative rounded-xl overflow-hidden shadow-md group'>
      <img src='${img}' class='h-40 w-full object-cover'>
      ${isAdmin ? `<button onclick='deleteImage(${index})' class='absolute top-2 right-2 bg-red-600 text-white w-6 h-6 flex items-center justify-center rounded-full text-xs'>✕</button>` : ""}
    </div>`;
  });
  if(imgs.length === 0) html += `<p class="text-gray-400 italic text-center py-20 w-full col-span-2">No photos uploaded.</p>`;
  html += "</div>";
  container.innerHTML = html;
}

function addContent(){
  if(activeTab === 'about') {
    let currentText = contentData['about'] && contentData['about'][0] ? contentData['about'][0] : "";
    let newVal = prompt("Enter About Us description:", currentText);
    if(newVal !== null){ 
      contentData['about'] = [newVal]; 
      save(); 
    }
  } else {
    let val = prompt("Enter new text item:");
    if(val){ contentData[activeTab].push(val); save(); }
  }
}

function editContent(){
  let current = contentData[activeTab].join("\n");
  let updated = prompt("Edit list items (one per line):", current);
  if(updated !== null){
    contentData[activeTab] = updated.split("\n").filter(line => line.trim() !== "");
    save();
  }
}

function save(){ localStorage.setItem("contentData", JSON.stringify(contentData)); render(); }

function uploadImages(event){
  const files = Array.from(event.target.files);
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      if(!gallery[activeTab]) gallery[activeTab] = [];
      gallery[activeTab].push(e.target.result);
      localStorage.setItem("gallery", JSON.stringify(gallery));
      render();
    };
    reader.readAsDataURL(file);
  });
}

function deleteImage(index){
  if(confirm("Delete this photo?")){
    gallery[activeTab].splice(index,1);
    localStorage.setItem("gallery", JSON.stringify(gallery));
    render();
  }
}

render();
</script>

</body>
</html>
