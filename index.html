<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jaya Hari Parayana Sangha</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
<script src="config.js"></script>

<style>
  body { overflow: hidden; height: 100vh; display: flex; flex-direction: column; font-family: sans-serif; }
  
  /* Side Tabs - Restored to Yellow Theme #fde68a */
  .tab-btn { padding:10px; border-radius:12px; cursor:pointer; margin-bottom:6px; font-weight:600; background-color: #fde68a; transition: 0.2s; font-size: 0.9rem; border: 1px solid transparent; color: #92400e; }
  .tab-btn:hover { background-color: #fb923c; color: white; }
  .active-tab { background-color: #ea580c !important; color: white !important; border-color: #9a3412; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
  
  /* Top Navigation Buttons */
  .top-btn { padding:6px 16px; border-radius:9999px; font-weight:bold; margin-right:8px; background-color: #fde68a; font-size: 0.85rem; color: #92400e; }
  .top-btn.active { background-color: #ea580c; color: white; }
  
  /* Action Buttons (WhatsApp/Form) */
  .action-btn { display:inline-block; margin-top:8px; padding:8px 16px; border-radius:8px; color:white; font-weight:bold; text-decoration:none; font-size: 0.85rem; }
  .whatsapp { background-color: #16a34a; }
  .form { background-color: #2563eb; }

  /* Scrollbar Styling */
  .custom-scroll::-webkit-scrollbar { width: 6px; }
  .custom-scroll::-webkit-scrollbar-thumb { background: #fb923c; border-radius: 10px; }

  .admin-tab { background-color: #f1f5f9; border: 1px dashed #cbd5e1; margin-top: auto; color: #475569; }
  .motto-text { font-weight: 800; color: #7c2d12; text-transform: uppercase; letter-spacing: 0.05em; font-size: 1.1rem; }
</style>
</head>

<body class="bg-yellow-50">

<header class="bg-yellow-100 p-3 shadow-sm shrink-0 border-b border-yellow-200">
  <div class="max-w-6xl mx-auto flex justify-between items-center">
    <div class="w-1/3 text-left">
      <span class="motto-text ml-4 hidden md:inline">Hari Sarvothama</span>
    </div>
    <div class="w-1/3 flex justify-center">
      <img src="JHPS.jpg" alt="JHPS Logo" class="h-32 md:h-40 w-auto rounded-xl shadow-lg border-2 border-white bg-white">
    </div>
    <div class="w-1/3 text-right">
      <span class="motto-text mr-4 hidden md:inline">Vayu Jeevothama</span>
    </div>
  </div>
  <div class="md:hidden flex justify-between px-4 mt-2">
    <span class="motto-text text-xs italic">Hari Sarvothama</span>
    <span class="motto-text text-xs italic">Vayu Jeevothama</span>
  </div>
</header>

<div class="flex flex-1 overflow-hidden">

  <aside class="w-60 bg-yellow-100 p-4 border-r border-yellow-200 flex flex-col shrink-0 overflow-y-auto custom-scroll">
    <div id="parayanaTab" class="tab-btn active-tab" onclick="switchTab('parayana')">📖 Parayana</div>
    <div id="bhajanaTab" class="tab-btn" onclick="switchTab('bhajana')">🎵 Bhajana</div>
    <div id="trainingsTab" class="tab-btn" onclick="switchTab('trainings')">🎓 Trainings</div>
    <div id="sevaTab" class="tab-btn" onclick="switchTab('seva')">❤️ Seva</div>
    <div id="activitiesTab" class="tab-btn" onclick="switchTab('activities')">📅 Activities</div>
    <div id="aboutTab" class="tab-btn" onclick="switchTab('about')">ℹ️ About Us</div>
    <div id="contactTab" class="tab-btn" onclick="switchTab('contact')">📞 Contact</div>
    
    <div class="mt-auto pt-4">
      <div id="adminTab" class="tab-btn admin-tab" onclick="switchTab('admin')">🔒 Admin Login</div>
    </div>
  </aside>

  <main class="flex-1 p-6 flex flex-col overflow-hidden">
    
    <div class="mb-4 flex items-center shrink-0">
      <button id="infoBtn" class="top-btn active" onclick="showView('info')">Info Details</button>
      <button id="galleryBtn" class="top-btn" onclick="showView('gallery')">Gallery View</button>
    </div>

    <div id="contentArea" class="bg-white p-6 rounded-2xl shadow-md border border-yellow-100 flex-1 overflow-y-auto custom-scroll">
    </div>

  </main>
</div>

<script>
let activeTab = "parayana";
let currentView = "info";
let isAdmin = (sessionStorage.getItem("isLoggedIn") === "true");

const WHATSAPP = "919686155558";
const FORM = "https://docs.google.com/forms/d/1JZgvz4o701VtrCeTcyD5mb1Dl31DC_eAXagFk_2iUck/viewform";

let contentData = JSON.parse(localStorage.getItem("contentData")) || {
  parayana: ["Rayara Ashtottara", "Hari Vayu Stuti Purascharana", "Sundarakanda"],
  bhajana: ["Jaya Hari Bhajana Mandali", "Hari Priya Bhajana Mandali"],
  trainings: ["Sandhya Vandana", "Deva Pooja"],
  seva: ["Annadhana"],
  activities: ["Weekly Events"],
  about: ["Welcome to Jaya Hari Parayana Sangha. Update this text from the Admin panel."],
  contact: ["Jaya Hari Parayana Sangha", "Ph: 9686155558", "Email: jayahariparayanasangha@gmail.com"]
};

let gallery = JSON.parse(localStorage.getItem("gallery")) || {};

// LOGIN FUNCTION
function handleLogin() {
    const pwdInput = document.getElementById("adminPwd").value.trim();
    
    // Safety check for external config.js
    if (typeof ADMIN_PASSWORD === 'undefined') {
        alert("System Error: config.js not found in your GitHub folder.");
        return;
    }

    if (pwdInput === ADMIN_PASSWORD) {
        isAdmin = true;
        sessionStorage.setItem("isLoggedIn", "true");
        alert("Login Successful!");
        switchTab('parayana');
    } else {
        alert("Incorrect Password. Please try again.");
    }
}

function handleLogout() {
    isAdmin = false;
    sessionStorage.removeItem("isLoggedIn");
    alert("Logged Out");
    switchTab('parayana');
}

function switchTab(tab){
  activeTab = tab;
  ["parayana","bhajana","trainings","seva","activities","about","contact","admin"].forEach(t => {
    const el = document.getElementById(t + "Tab");
    if(el) el.classList.remove("active-tab");
  });
  document.getElementById(tab + "Tab").classList.add("active-tab");
  render();
}

function showView(view){
  currentView = view;
  document.getElementById("infoBtn").classList.toggle("active", view === "info");
  document.getElementById("galleryBtn").classList.toggle("active", view === "gallery");
  render();
}

function render(){
  let area = document.getElementById("contentArea");
  if (activeTab === "admin") renderAdminPanel(area);
  else if (currentView === "gallery") renderGallery(area);
  else renderInfo(area);
}

function renderAdminPanel(container) {
  if (!isAdmin) {
    container.innerHTML = `
      <div class="max-w-xs mx-auto mt-10 p-8 border rounded-2xl bg-yellow-50 text-center shadow-inner">
        <h2 class="text-xl font-bold mb-6 text-yellow-900">Admin Access</h2>
        <input type="password" id="adminPwd" class="border-2 border-yellow-200 p-3 rounded-lg w-full mb-6 outline-none focus:border-orange-500" placeholder="Password">
        <button onclick="handleLogin()" class="bg-orange-600 text-white px-4 py-2 rounded-lg font-bold w-full hover:bg-orange-700 transition">Submit</button>
      </div>`;
  } else {
    container.innerHTML = `
      <div class="max-w-xs mx-auto mt-10 p-8 border rounded-2xl bg-green-50 text-center shadow-inner">
        <p class="text-green-800 font-bold mb-6">Admin Mode Active</p>
        <button onclick="handleLogout()" class="bg-red-500 text-white px-4 py-2 rounded-lg font-bold w-full hover:bg-red-600 transition">Logout</button>
      </div>`;
  }
}

function renderInfo(container){
  let data = contentData[activeTab] || [];
  let displayTitle = activeTab === 'about' ? 'About Us' : activeTab;
  let html = `<h2 class='text-2xl font-bold capitalize mb-6 text-orange-800 border-b-2 border-orange-100 pb-2'>${displayTitle}</h2>`;

  if(isAdmin){
    html += `<div class='mb-6 flex gap-2'>
      <button onclick='addContent()' class='bg-blue-600 text-white px-3 py-1 rounded text-xs font-bold'>${activeTab === 'about' ? 'Update Text' : '+ Add Item'}</button>
      ${activeTab !== 'about' ? `<button onclick='editContent()' class='bg-yellow-500 text-white px-3 py-1 rounded text-xs font-bold'>✏️ Edit All</button>` : ''}
    </div>`;
  }

  if(activeTab === 'about') {
    html += `<div class="text-gray-800 text-lg font-bold leading-relaxed bg-yellow-50 p-6 rounded-2xl border border-yellow-100 shadow-sm whitespace-pre-wrap">
               ${data[0] || "No description yet."}
             </div>`;
  } else {
    html += "<ul class='space-y-4'>";
    data.forEach(item => {
        html += `<li class='flex items-start gap-4 text-gray-800 bg-yellow-50 p-4 rounded-xl border border-yellow-100 text-lg font-bold shadow-sm'>
                  <span class='text-orange-600 mt-1'>✦</span> <span class="leading-relaxed">${item}</span>
                </li>`;
    });
    html += "</ul>";
  }

  if(activeTab === "parayana"){
    html += `
      <div class='mt-8 p-6 bg-yellow-100 border-l-4 border-yellow-500 rounded-r-xl shadow-sm'>
        <p class='font-bold text-orange-900 text-base mb-4 italic text-center'>Contact us via WhatsApp to confirm slots before registering.</p>
        <div class='flex justify-center gap-3'>
          <a class='action-btn whatsapp' href='https://wa.me/${WHATSAPP}' target='_blank'>WhatsApp</a>
          <a class='action-btn form' href='${FORM}' target='_blank'>Register</a>
        </div>
      </div>`;
  }
  container.innerHTML = html;
}

function renderGallery(container){
  let html = `<h2 class='text-2xl font-bold mb-6 text-orange-800 border-b-2 border-orange-100 pb-2'>Gallery</h2>`;
  if(isAdmin) html += `<input type="file" multiple onchange="uploadImages(event)" class="mb-6 text-xs block">`;

  html += "<div class='grid grid-cols-2 gap-6'>";
  const imgs = gallery[activeTab] || [];
  imgs.forEach((img, index) => {
    html += `<div class='relative rounded-2xl overflow-hidden shadow-md group'>
      <img src='${img}' class='h-48 w-full object-cover transition duration-300 group-hover:scale-110'>
      ${isAdmin ? `<button onclick='deleteImage(${index})' class='absolute top-2 right-2 bg-red-600 text-white w-6 h-6 flex items-center justify-center rounded-full text-xs shadow-lg'>✕</button>` : ""}
    </div>`;
  });
  if(imgs.length === 0) html += `<p class="text-gray-400 italic text-center py-20 w-full col-span-2">No photos uploaded.</p>`;
  html += "</div>";
  container.innerHTML = html;
}

function addContent(){
  if(activeTab === 'about') {
    let currentText = contentData['about'] && contentData['about'][0] ? contentData['about'][0] : "";
    let newVal = prompt("Enter About Us description:", currentText);
    if(newVal !== null){ contentData['about'] = [newVal.trim()]; save(); }
  } else {
    let val = prompt("Enter new text item:");
    if(val){ contentData[activeTab].push(val.trim()); save(); }
  }
}

function editContent(){
  let current = contentData[activeTab].join("\n");
  let updated = prompt("Edit list items (one per line):", current);
  if(updated !== null){
    contentData[activeTab] = updated.split("\n").filter(line => line.trim() !== "");
    save();
  }
}

function save(){ localStorage.setItem("contentData", JSON.stringify(contentData)); render(); }

function uploadImages(event){
  const files = Array.from(event.target.files);
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      if(!gallery[activeTab]) gallery[activeTab] = [];
      gallery[activeTab].push(e.target.result);
      localStorage.setItem("gallery", JSON.stringify(gallery));
      render();
    };
    reader.readAsDataURL(file);
  });
}

function deleteImage(index){
  if(confirm("Delete this photo?")){
    gallery[activeTab].splice(index,1);
    localStorage.setItem("gallery", JSON.stringify(gallery));
    render();
  }
}

render();
</script>

</body>
</html>
