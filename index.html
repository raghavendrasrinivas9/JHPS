<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jaya Hari Parayana Sangha</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
  body { display: flex; flex-direction: column; font-family: sans-serif; min-height: 100vh; background-color: #fffbeb; }
  @media (min-width: 768px) { body { height: 100vh; overflow: hidden; } }
  
  .tab-btn { padding:10px; border-radius:12px; cursor:pointer; font-weight:600; background-color: #fde68a; transition: 0.2s; font-size: 0.85rem; border: 1px solid transparent; color: #92400e; white-space: nowrap; }
  .tab-btn:hover { background-color: #fb923c; color: white; }
  .active-tab { background-color: #ea580c !important; color: white !important; border-color: #9a3412; }
  
  .top-btn { padding:6px 16px; border-radius:9999px; font-weight:bold; margin-right:8px; background-color: #fde68a; font-size: 0.85rem; color: #92400e; }
  .top-btn.active { background-color: #ea580c; color: white; }

  /* Sub-tab styling for Stotras */
  .sub-tab-btn { padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; font-weight: bold; background-color: #fef3c7; border: 1px solid #fcd34d; color: #92400e; transition: 0.2s; }
  .sub-tab-btn.active { background-color: #d97706; color: white; border-color: #92400e; }
  
  .action-btn { display:inline-block; margin-top:8px; padding:8px 20px; border-radius:8px; color:white; font-weight:bold; text-decoration:none; font-size: 0.9rem; transition: 0.3s; text-align: center; }
  .whatsapp { background-color: #16a34a; }
  .form { background-color: #2563eb; }
  .instagram { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); }
  .youtube { background-color: #ff0000; }

  .custom-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
  .custom-scroll::-webkit-scrollbar-thumb { background: #fb923c; border-radius: 10px; }

  .motto-text { font-weight: 800; color: #7c2d12; text-transform: uppercase; letter-spacing: 0.05em; font-size: 0.65rem; line-height: 1.2; }
  @media (min-width: 768px) { .motto-text { font-size: 1.1rem; } }

  .area-grid { display: grid; grid-template-columns: repeat(1, minmax(0, 1fr)); gap: 12px; width: 100%; }
  @media (min-width: 640px) { .area-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); } }

  .area-box { background: #fff; border: 1px solid #fed7aa; border-radius: 10px; padding: 12px; border-left: 4px solid #ea580c; display: flex; flex-direction: column; }
  .contact-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 6px 0; border-bottom: 1px solid #fff7ed; }
  .contact-row:last-child { border-bottom: none; }

  .call-btn { background-color: #fff7ed; color: #9a3412; padding: 4px 10px; border-radius: 6px; border: 1px solid #ffedd5; font-size: 0.7rem; font-weight: bold; }
  
  .stotra-content { font-family: 'Sanskrit', serif; line-height: 1.8; color: #431407; background: #fffcf0; padding: 20px; border-radius: 12px; border: 1px dashed #d97706; }
</style>
</head>

<body>

<header class="bg-yellow-100 p-2 md:p-3 shadow-sm shrink-0 border-b border-yellow-200">
  <div class="max-w-6xl mx-auto flex justify-between items-center">
    <div class="w-1/4 md:w-1/3 flex items-center justify-start gap-1 md:gap-3">
      <img src="images/Ram.jpg" alt="Ram" class="h-10 w-10 md:h-20 md:w-20 rounded-full border-2 border-orange-400 object-cover shadow-sm">
      <span class="motto-text">Hari <br class="md:hidden">Sarvothama</span>
    </div>
    <div class="w-2/4 md:w-1/3 flex justify-center">
      <img src="JHPS.jpg" alt="JHPS Logo" class="h-20 md:h-40 w-auto rounded-xl shadow-lg border-2 border-white bg-white">
    </div>
    <div class="w-1/4 md:w-1/3 flex items-center justify-end gap-1 md:gap-3 text-right">
      <span class="motto-text">Vayu <br class="md:hidden">Jeevothama</span>
      <img src="images/Hanuman.jpg" alt="Hanuman" class="h-10 w-10 md:h-20 md:w-20 rounded-full border-2 border-orange-400 object-cover shadow-sm">
    </div>
  </div>
</header>

<div class="flex flex-col md:flex-row flex-1 overflow-hidden">
  <aside class="w-full md:w-60 bg-yellow-100 p-3 md:p-4 border-b md:border-r border-yellow-200 flex flex-row md:flex-col shrink-0 overflow-x-auto md:overflow-y-auto custom-scroll gap-2">
    <div id="parayanaTab" class="tab-btn active-tab" onclick="switchTab('parayana')">📖 Parayana</div>
    <div id="stotrasTab" class="tab-btn" onclick="switchTab('stotras')">📜 Stotras</div>
    <div id="bhajanaTab" class="tab-btn" onclick="switchTab('bhajana')">🎵 Bhajana</div>
    <div id="trainingsTab" class="tab-btn" onclick="switchTab('trainings')">🎓 Trainings</div>
    <div id="sevaTab" class="tab-btn" onclick="switchTab('seva')">❤️ Seva</div>
    <div id="activitiesTab" class="tab-btn" onclick="switchTab('activities')">📅 Activities</div>
    <div id="aboutTab" class="tab-btn" onclick="switchTab('about')">ℹ️ About</div>
    <div id="contactTab" class="tab-btn" onclick="switchTab('contact')">📞 Contact</div>
  </aside>

  <main class="flex-1 p-4 md:p-6 flex flex-col overflow-hidden">
    <div class="mb-4 flex items-center shrink-0">
      <button id="infoBtn" class="top-btn active" onclick="showView('info')">Details</button>
      <button id="galleryBtn" class="top-btn" onclick="showView('gallery')">Gallery</button>
    </div>
    <div id="contentArea" class="bg-white p-4 md:p-6 rounded-2xl shadow-md border border-yellow-100 flex-1 overflow-y-auto custom-scroll">
    </div>
  </main>
</div>

<script>
let activeTab = "parayana";
let currentView = "info";
let activeStotra = "rayara";

const WHATSAPP = "919686155558";
const FORM = "https://docs.google.com/forms/d/1JZgvz4o701VtrCeTcyD5mb1Dl31DC_eAXagFk_2iUck/viewform";

const stotraData = {
    rayara: "Text for Rayara Ashtottara will be placed here...",
    vayu: "Text for Hari Vayu Stuti Purascharana will be placed here...",
    sundara: "Text for Sundarakanda will be placed here..."
};

const contentData = {
  parayana: [
    { name: "Rayara Ashtottara", action: () => switchStotra('rayara') },
    { name: "Hari Vayu Stuti Purascharana", action: () => switchStotra('vayu') },
    { name: "Sundarakanda", action: () => switchStotra('sundara') }
  ],
  bhajana: ["Jaya Hari Bhajana Mandali"],
  trainings: ["Sandhya Vandana", "Sankshipta Deva Pooja", "Mantrabhyasa"],
  seva: ["Annadhana"],
  activities: ["Weekly Events", "- **Every Thursday at 7:30 AM: Rayara Ashtottara at Bhagyanagara Krishna Matha, Kondapur**"],
  about: ["Nurturing Dharma Through Practice."]
};

function switchTab(tab){
  activeTab = tab;
  ["parayana","stotras","bhajana","trainings","seva","activities","about","contact"].forEach(t => {
    const el = document.getElementById(t + "Tab");
    if(el) el.classList.remove("active-tab");
  });
  document.getElementById(tab + "Tab").classList.add("active-tab");
  document.getElementById(tab + "Tab").scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
  render();
}

function switchStotra(stotraKey) {
    activeTab = "stotras";
    activeStotra = stotraKey;
    switchTab("stotras");
}

function showView(view){
  currentView = view;
  document.getElementById("infoBtn").classList.toggle("active", view === "info");
  document.getElementById("galleryBtn").classList.toggle("active", view === "gallery");
  render();
}

function render(){
  let area = document.getElementById("contentArea");
  if (currentView === "gallery") renderGallery(area);
  else renderInfo(area);
}

function renderInfo(container){
  let title = activeTab.charAt(0).toUpperCase() + activeTab.slice(1);
  let html = `<h2 class='text-xl md:text-2xl font-bold mb-4 text-orange-800 border-b-2 border-orange-100 pb-2'>${title === 'About' ? 'About Us' : title}</h2>`;
  
  if(activeTab === "stotras") {
      html += `
        <div class="flex gap-2 mb-6 overflow-x-auto pb-2 custom-scroll">
            <button class="sub-tab-btn ${activeStotra === 'rayara' ? 'active' : ''}" onclick="activeStotra='rayara'; render();">Rayara Ashtottara</button>
            <button class="sub-tab-btn ${activeStotra === 'vayu' ? 'active' : ''}" onclick="activeStotra='vayu'; render();">Hari Vayu Stuti</button>
            <button class="sub-tab-btn ${activeStotra === 'sundara' ? 'active' : ''}" onclick="activeStotra='sundara'; render();">Sundarakanda</button>
        </div>
        <div class="stotra-content">
            ${stotraData[activeStotra]}
        </div>
      `;
  } else if(activeTab === "contact") {
      html += `
        <div class='flex flex-col gap-3'>
          <div class='bg-yellow-50 p-3 rounded-xl border text-sm font-bold shadow-sm text-gray-800'>✦ <strong>Jaya Hari Parayana Sangha</strong></div>
          <div class='bg-yellow-50 p-3 rounded-xl border text-sm font-bold shadow-sm text-gray-800 mb-2'>✦ Email: jayahariparayanasangha@gmail.com</div>
          <h3 class='text-md font-bold text-orange-700 mt-2 mb-2'>Area Contacts</h3>
          <div class="area-grid">
            ${["Kondapur", "Nallagandla", "Miyapur", "BHEL"].map(place => `
              <div class='area-box'>
                <div class='text-[10px] font-black uppercase text-orange-600 tracking-widest mb-2 border-b border-orange-50 pb-1'>${place}</div>
                <div class='contact-row'><div class='text-xs font-semibold text-gray-800'>Pavan Ashrit</div><a href="tel:9686155558" class="call-btn">9686155558</a></div>
                <div class='contact-row'><div class='text-xs font-semibold text-gray-800'>Srikanth Joshi</div><a href="tel:9573313511" class="call-btn">9573313511</a></div>
              </div>`).join('')}
          </div>
        </div>`;
  } else {
      let data = contentData[activeTab] || [];
      html += "<div class='flex flex-col gap-2'>";
      data.forEach(item => {
          if(typeof item === 'object') {
              html += `<div onclick="(${item.action})()" class='bg-yellow-50 p-3 rounded-xl border text-sm md:text-base font-bold shadow-sm text-gray-800 cursor-pointer hover:bg-orange-50 transition'>✦ ${item.name} <i class="fa-solid fa-arrow-right ml-2 text-xs text-orange-400"></i></div>`;
          } else if(item.startsWith("-")) {
              html += `<div class='ml-6 md:ml-10 text-sm text-gray-700 bg-orange-50 p-2 rounded-lg border border-orange-100 italic'>○ ${item.replace(/\*\*/g, '').substring(1).trim()}</div>`;
          } else {
              html += `<div class='bg-yellow-50 p-3 rounded-xl border text-sm md:text-base font-bold shadow-sm text-gray-800'>✦ ${item}</div>`;
          }
      });
      html += "</div>";
  }

  if(activeTab === "parayana") {
    html += `<div class='mt-6 p-4 bg-yellow-100 border-l-4 border-yellow-500 rounded-r-xl shadow-sm text-center'>
        <p class='font-bold text-orange-900 text-sm mb-3 italic underline'>Please contact us via WhatsApp to confirm slots before registering.</p>
        <div class='flex flex-col sm:flex-row justify-center gap-2'>
          <a class='action-btn whatsapp shadow-md' href='https://wa.me/${WHATSAPP}' target='_blank' style="padding: 6px 16px; font-size: 0.8rem;"><i class="fa-brands fa-whatsapp mr-2"></i>WhatsApp</a>
          <a class='action-btn form shadow-md' href='${FORM}' target='_blank' style="padding: 6px 16px; font-size: 0.8rem;"><i class="fa-solid fa-file-signature mr-2"></i>Register</a>
        </div>
      </div>`;
  }
  container.innerHTML = html;
}

function renderGallery(container){
  container.innerHTML = `<h2 class='text-xl md:text-2xl font-bold mb-4 text-orange-800 border-b-2 border-orange-100 pb-2'>Gallery</h2><p class="text-gray-400 italic text-center py-20 w-full">No photos available yet.</p>`;
}

render();
</script>
</body>
</html>
